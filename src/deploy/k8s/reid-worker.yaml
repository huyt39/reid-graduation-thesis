apiVersion: apps/v1
kind: Deployment
metadata:
  name: reid-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reid-worker
  template:
    metadata:
      labels:
        app: reid-worker
    spec:
      containers:
      - name: reid-worker
        image: reid-worker:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: WORKER_KAFKA_BOOTSTRAP_SERVERS
          value: kafka:9092
        - name: WORKER_INPUT_TOPIC
          value: reid_input
        - name: WORKER_OUTPUT_TOPIC
          value: reid_output
        - name: WORKER_CONSUMER_GROUP
          value: reid_worker_group
        - name: WORKER_SCHEMA_PATH
          value: src/contracts/reid_input.avsc
        - name: WORKER_OUTPUT_SCHEMA_PATH
          value: src/contracts/reid_output.avsc
        - name: WORKER_MODEL_SERVICE_URL
          value: http://inference-engine:8000
        - name: WORKER_QDRANT_HOST
          value: qdrant
        - name: WORKER_QDRANT_PORT
          value: "6333"
        - name: WORKER_MONGO_URI
          value: mongodb://mongo:27017
        - name: WORKER_MONGO_DB
          value: reid_production
        - name: WORKER_REDIS_URL
          value: redis://redis:6379/0
        - name: WORKER_PERSON_ID_SEQ_KEY
          value: reid:seq:person_id
        - name: WORKER_MINIO_ENDPOINT
          value: minio:9000
        - name: WORKER_MINIO_ACCESS_KEY
          value: minio
        - name: WORKER_MINIO_SECRET_KEY
          value: minio123
