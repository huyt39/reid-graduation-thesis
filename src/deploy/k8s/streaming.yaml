apiVersion: apps/v1
kind: Deployment
metadata:
  name: streaming
spec:
  replicas: 1
  selector:
    matchLabels:
      app: streaming
  template:
    metadata:
      labels:
        app: streaming
    spec:
      containers:
      - name: streaming
        image: streaming:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8765
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8765
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8765
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: streaming
spec:
  selector:
    app: streaming
  ports:
  - name: http
    port: 8765
    targetPort: 8765
