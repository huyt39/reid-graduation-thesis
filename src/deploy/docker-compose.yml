services:
  kafka:
    image: bitnami/kafka:3.6
    ports: ["9092:9092"]
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - ALLOW_PLAINTEXT_LISTENER=yes
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9092'"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    ports: ["27017:27017"]

  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333"]

  redis:
    image: redis:7
    ports: ["6379:6379"]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports: ["9000:9000", "9001:9001"]

  edge:
    build: ../edge
    env_file: ../edge/.env.example
    depends_on: [kafka]

  reid_worker:
    build: ../reid_worker
    env_file: ../reid_worker/.env.example
    depends_on: [kafka, mongo, qdrant, redis]

  inference_engine:
    build: ../inference_engine
    env_file: ../inference_engine/.env.example
    depends_on: [mongo]
    ports: ["8000:8000"]

  streaming:
    build: ../streaming
    env_file: ../streaming/.env.example
    depends_on: [kafka]
    ports: ["8765:8765"]

  gateway:
    build: ../gateway
    env_file: ../gateway/.env.example
    depends_on: [streaming, query_service]
    ports: ["8080:8080"]

  query_service:
    build: ../query_service
    env_file: ../query_service/.env.example
    depends_on: [mongo, qdrant, redis]
    ports: ["8090:8090"]

