services:
  kafka:
    image: apache/kafka:4.1.2
    restart: unless-stopped
    ports: ["19092:9092"]
    environment:
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx512m"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9092'"]
      interval: 10s
      timeout: 5s
      retries: 10



  mongo:
    image: mongo:7
    command: ["mongod", "--bind_ip_all", "--setParameter", "diagnosticDataCollectionEnabled=false"]
    ports: ["27018:27017"]

  qdrant:
    image: qdrant/qdrant:latest
    ports: ["16333:6333"]

  redis:
    image: redis:7
    ports: ["6380:6379"]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports: ["9002:9000", "9003:9001"]

  # ── Camera 1 — plays whatever video EDGE_SOURCE_URL points at (see infer/). ──
  edge_cam1:
    build: ../edge
    env_file: ../edge/.env
    environment:
      - EDGE_SOURCE_URL=/app/infer/device52.MOV
      - EDGE_DEVICE_ID=cam1
      - EDGE_REID_TOPIC=reid_input_cam1
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ../contracts:/app/src/contracts:ro
      - ../../infer:/app/infer:ro

  # ── Camera 2 — plays whatever video EDGE_SOURCE_URL points at (see infer/). ──
  edge_cam2:
    build: ../edge
    env_file: ../edge/.env.example
    environment:
      - EDGE_SOURCE_URL=/app/infer/device51.MOV
      - EDGE_DEVICE_ID=cam2
      - EDGE_REID_TOPIC=reid_input_cam2
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ../contracts:/app/src/contracts:ro
      - ../../infer:/app/infer:ro

  # ── Standalone raw-video MJPEG server. Reads each video with its OWN capture
  #    and serves smooth MJPEG directly to the UI, fully decoupled from the edge
  #    ReID loop and Kafka (does NOT affect reid_input/worker). Keep
  #    RAW_STREAM_SOURCES in sync with the edge EDGE_SOURCE_URL values above. ──
  raw_stream:
    build: ../raw_stream
    environment:
      - RAW_STREAM_SOURCES=cam1=/app/infer/device52.MOV,cam2=/app/infer/device51.MOV
      - RAW_STREAM_FPS=10
      - RAW_STREAM_JPEG_QUALITY=60
      - RAW_STREAM_MAX_DIM=540
      # Cap FFmpeg decoder threads (separate from cv2.setNumThreads) so one
      # reader uses ~1 core instead of fanning across the host.
      - OPENCV_FFMPEG_CAPTURE_OPTIONS=threads;1
    # Hard CPU ceiling so the raw stream can never starve the ReID pipeline even
    # while the Live tab is open. Combined with lazy readers (0 CPU when no
    # client) this keeps ReID unaffected. Raise if smoother video is needed.
    cpus: "1.5"
    volumes:
      - ../../infer:/app/infer:ro
    ports: ["8770:8770"]

  # ── Worker for camera 1. Shares Qdrant gallery + Redis person-id sequence
  #    with worker_cam2 → same physical person across cameras = same person_id.
  worker_cam1:
    build: ../reid_worker
    env_file: ../reid_worker/.env
    environment:
      - WORKER_PERSON_ID_SEQ_KEY=reid:seq:person_id
      - WORKER_INPUT_TOPIC=reid_input_cam1
      - WORKER_CONSUMER_GROUP=reid_worker_cam1
      # Frame-clock lifecycle: count elapsed FRAMES (not wall-clock) for track/
      # person staleness + co-active/reuse/match guards → ReID result is
      # invariant to host CPU load (e.g. Live tab streaming). A/B via host env:
      #   FRAME_CLOCK=true scripts/demo.sh up --build --reset   (ON)
      #   scripts/demo.sh up --build --reset                    (OFF = baseline)
      - WORKER_FRAME_CLOCK_LIFECYCLE_ENABLED=${FRAME_CLOCK:-false}
    depends_on:
      kafka:
        condition: service_healthy
      mongo:
        condition: service_started
      qdrant:
        condition: service_started
      redis:
        condition: service_started
      minio:
        condition: service_started
      inference_engine:
        condition: service_started
    volumes:
      - ../contracts:/app/src/contracts:ro

  worker_cam2:
    build: ../reid_worker
    env_file: ../reid_worker/.env
    environment:
      - WORKER_PERSON_ID_SEQ_KEY=reid:seq:person_id
      - WORKER_INPUT_TOPIC=reid_input_cam2
      - WORKER_CONSUMER_GROUP=reid_worker_cam2
      # See worker_cam1 — frame-clock lifecycle A/B toggle (host env FRAME_CLOCK).
      - WORKER_FRAME_CLOCK_LIFECYCLE_ENABLED=${FRAME_CLOCK:-false}
    depends_on:
      kafka:
        condition: service_healthy
      mongo:
        condition: service_started
      qdrant:
        condition: service_started
      redis:
        condition: service_started
      minio:
        condition: service_started
      inference_engine:
        condition: service_started
    volumes:
      - ../contracts:/app/src/contracts:ro

  triton:
    image: nvcr.io/nvidia/tritonserver:24.04-py3
    command: tritonserver --model-repository=/models --strict-model-config=false --log-info=1
    volumes:
      - ../../triton_models:/models:ro
    ports: ["8011:8000", "8012:8001", "8013:8002"]
    healthcheck:
      test: ["CMD", "/bin/bash", "-lc", "curl -fsS http://localhost:8000/v2/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 30

  inference_engine:
    build: ../inference_engine
    env_file: ../inference_engine/.env
    depends_on:
      mongo:
        condition: service_started
    environment:
      - INFERENCE_USE_TRITON=false
      - INFERENCE_TRITON_URL=triton:8000
      - INFERENCE_OSNET_WEIGHTS=/app/models/osnet_good/model.pth.tar-150
      - INFERENCE_OSNET_ONNX_PATH=
      - INFERENCE_MULTI_ATTR_WEIGHTS=/app/src/assets/models/multi_attr/best_model_multi_attr_b0.pth
      - INFERENCE_STANDALONE_GENDER_WEIGHTS=/app/src/assets/models/gender/gender_model.pth
    volumes:
      - ../../efficientnet_b0_gender_classifier.pth:/app/models/efficientnet_b0_gender_classifier.pth:ro
      - ../../reid-microservices/src/model_serving/src/assets/models/osnet/model.pth.tar-150:/app/models/osnet_good/model.pth.tar-150:ro
      - ../../triton_models/osnet/1:/app/models/osnet:ro
    ports: ["8001:8000"]

  streaming:
    build: ../streaming
    env_file: ../streaming/.env
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ../contracts:/app/src/contracts:ro
    ports: ["8765:8765"]

  gateway:
    build: ../gateway
    env_file: ../gateway/.env
    depends_on: [streaming, query_service]
    ports: ["18080:8080"]

  query_service:
    build: ../query_service
    env_file: ../query_service/.env
    depends_on: [mongo, qdrant, redis, minio, vllm_service]
    ports: ["18090:8090"]

  vllm_service:
    build: ../vllm_service
    env_file: ../vllm_service/.env
    ports: ["18100:8100"]
    # The upstream LLM endpoint is configured via VLLM_LLM_BASE_URL in the env file —
    # point at any OpenAI-compatible API (local vLLM container, Ollama, OpenAI, etc.).
    # query_service's NL parser falls back to a regex matcher if this service is down,
    # so the readiness check (VLLM_REQUIRE_LLM_FOR_READY=false) lets the stack come up
    # without a live LLM in dev environments.

  ui:
    build: ../ui
    environment:
      # Browser-side env: must point at the host-exposed gateway port (18080), not
      # the in-cluster service name — the browser can't resolve "gateway" itself.
      - NEXT_PUBLIC_GATEWAY_URL=http://localhost:18080
      - NEXT_PUBLIC_STREAMING_WS=ws://localhost:8765
      # Raw-video MJPEG server (host-exposed port); browser renders <img src=.../mjpeg>.
      - NEXT_PUBLIC_RAW_STREAM_URL=http://localhost:8770
    depends_on: [gateway]
    ports: ["3000:3000"]
