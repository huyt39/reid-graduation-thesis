services:
  kafka:
    image: apache/kafka:4.1.2
    ports: ["19092:9092"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9092'"]
      interval: 10s
      timeout: 5s
      retries: 10



  mongo:
    image: mongo:7
    ports: ["27018:27017"]

  qdrant:
    image: qdrant/qdrant:latest
    ports: ["16333:6333"]

  redis:
    image: redis:7
    ports: ["6380:6379"]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports: ["9002:9000", "9003:9001"]

  edge:
    build: ../edge
    env_file: ../edge/.env
    depends_on: [kafka]
    volumes:
      - ../contracts:/app/src/contracts:ro
      - ../../infer:/app/infer:ro

  reid_worker:
    build: ../reid_worker
    env_file: ../reid_worker/.env
    environment:
      - WORKER_PERSON_ID_SEQ_KEY=reid:seq:person_id
    depends_on: [kafka, mongo, qdrant, redis, minio, inference_engine]
    volumes:
      - ../contracts:/app/src/contracts:ro

  inference_engine:
    build: ../inference_engine
    env_file: ../inference_engine/.env
    depends_on: [mongo]
    volumes:
      - ../../poc-occlusion/weights/osnet_x1_0.pth.tar:/app/models/osnet_x1_0.pth.tar:ro
      - ../../efficientnet_b0_gender_classifier.pth:/app/models/efficientnet_b0_gender_classifier.pth:ro
    ports: ["8001:8000"]

  streaming:
    build: ../streaming
    env_file: ../streaming/.env
    depends_on: [kafka]
    volumes:
      - ../contracts:/app/src/contracts:ro
    ports: ["8765:8765"]

  gateway:
    build: ../gateway
    env_file: ../gateway/.env
    depends_on: [streaming, query_service]
    ports: ["18080:8080"]

  query_service:
    build: ../query_service
    env_file: ../query_service/.env
    depends_on: [mongo, qdrant, redis, minio, vllm_service]
    ports: ["18090:8090"]

  vllm_service:
    build: ../vllm_service
    env_file: ../vllm_service/.env
    ports: ["18100:8100"]
    # The upstream LLM endpoint is configured via VLLM_LLM_BASE_URL in the env file —
    # point at any OpenAI-compatible API (local vLLM container, Ollama, OpenAI, etc.).
    # query_service's NL parser falls back to a regex matcher if this service is down,
    # so the readiness check (VLLM_REQUIRE_LLM_FOR_READY=false) lets the stack come up
    # without a live LLM in dev environments.

  ui:
    build: ../ui
    environment:
      # Browser-side env: must point at the host-exposed gateway port (18080), not
      # the in-cluster service name — the browser can't resolve "gateway" itself.
      - NEXT_PUBLIC_GATEWAY_URL=http://localhost:18080
      - NEXT_PUBLIC_STREAMING_WS=ws://localhost:8765
    depends_on: [gateway]
    ports: ["3000:3000"]
